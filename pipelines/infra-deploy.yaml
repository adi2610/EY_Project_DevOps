trigger: none

parameters:

- name: environment
  type: string
  values:
    - dev
    - tst
    - sta

- name: region
  type: string
  values:
    - eastus
    - westus

- name: component
  type: string
  values:
    - acr
    - aks
    - vnet
    - redis
    - key-vault
    - sql
    - resourcegroup
    - monitoring

- name: action
  type: string
  values:
    - apply
    - destroy

variables:

  tfWorkingDir: infra/${{ parameters.component }}

stages:

# ---------------------------
# VALIDATE
# ---------------------------

- stage: Validate

  jobs:

  - job: TerraformValidate

    pool:
      vmImage: ubuntu-latest

    steps:

    - checkout: self

    - script: terraform init
      workingDirectory: $(tfWorkingDir)

    - script: terraform validate
      workingDirectory: $(tfWorkingDir)

# ---------------------------
# PLAN
# ---------------------------

- stage: Plan

  dependsOn: Validate

  jobs:

  - job: TerraformPlan

    steps:

    - script: |
        terraform plan \
        -var-file=../../env/${{ parameters.environment }}.tfvars \
        -out=tfplan
      workingDirectory: $(tfWorkingDir)

    - publish: $(tfWorkingDir)/tfplan
      artifact: terraformPlan

# ---------------------------
# APPROVAL
# ---------------------------

- stage: Approval

  dependsOn: Plan

  jobs:

  - deployment: ManualApproval

    environment: infra-${{ parameters.environment }}

    strategy:
      runOnce:
        deploy:
          steps:
          - script: echo "Awaiting approval"

# ---------------------------
# APPLY / DESTROY
# ---------------------------

- stage: Deploy

  dependsOn: Approval

  jobs:

  - job: TerraformDeploy

    steps:

    - download: current
      artifact: terraformPlan

    - script: terraform init
      workingDirectory: $(tfWorkingDir)

    - script: |
        if [ "${{ parameters.action }}" = "apply" ]; then
          terraform apply tfplan
        else
          terraform destroy -auto-approve
        fi
      workingDirectory: $(tfWorkingDir)