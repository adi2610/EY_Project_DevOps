replicaCount: 3

image:
  repository: acrprod.azurecr.io/payment-service
  tag: latest
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:

  limits:
    cpu: 1000m
    memory: 1024Mi

  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:

  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  fsGroup: 2000

securityContext:

  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsUser: 1000

env:

  SPRING_PROFILES_ACTIVE: prod
  JAVA_TOOL_OPTIONS: "-XX:+UseContainerSupport"

config:

  LOG_LEVEL: INFO
  SERVER_PORT: 8080

secrets:

  DB_USERNAME: dbuser
  DB_PASSWORD: dbpassword

livenessProbe:

  httpGet:
    path: /actuator/health
    port: 8080

  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:

  httpGet:
    path: /actuator/health/readiness
    port: 8080

  initialDelaySeconds: 20
  periodSeconds: 5

ingress:

  enabled: true
  className: nginx

  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /

  hosts:
    - host: app.company.com
      paths:
        - path: /
          pathType: Prefix

  tls: []

nodeSelector: {}

tolerations: []

affinity: {}