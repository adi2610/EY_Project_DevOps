apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ include "payment-service.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "payment-service.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backend
    app.kubernetes.io/managed-by: Helm

spec:

  replicas: {{ .Values.replicaCount }}

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "payment-service.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}

  template:

    metadata:
      labels:
        app.kubernetes.io/name: {{ include "payment-service.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}

      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"

    spec:

      serviceAccountName: {{ include "payment-service.serviceAccountName" . }}

      terminationGracePeriodSeconds: 30

      containers:

        - name: payment-service

          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - containerPort: 8080
              name: http

          env:

            - name: NODE_ENV
              value: {{ .Values.env.NODE_ENV | quote }}

            - name: SERVICE_NAME
              value: {{ include "payment-service.name" . }}

            - name: PORT
              value: "8080"

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}

          # -------------------------------------
          # LIVENESS PROBE
          # -------------------------------------

          livenessProbe:
            httpGet:
              path: /health/live
              port: http

            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # -------------------------------------
          # READINESS PROBE
          # -------------------------------------

          readinessProbe:
            httpGet:
              path: /health/ready
              port: http

            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          # -------------------------------------
          # STARTUP PROBE
          # IMPORTANT FOR JAVA APPS
          # -------------------------------------

          startupProbe:
            httpGet:
              path: /health/live
              port: http

            failureThreshold: 30
            periodSeconds: 10

          # -------------------------------------
          # GRACEFUL SHUTDOWN
          # -------------------------------------

          lifecycle:

            preStop:

              exec:
                command:
                  - sh
                  - -c
                  - "sleep 10"